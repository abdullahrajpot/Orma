<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="sidepanel.css">
<title>Orma — Chat</title>
</head>
<body>
  <div class="panel">
    <header class="head">
      <span class="mark">ഓ</span>
      <div>
        <div class="brand-name">Chat with your memory</div>
        <div class="brand-sub">Answers use only what you've saved</div>
      </div>
    </header>

    <div id="messages" class="messages"></div>

    <form id="form" class="composer">
      <input id="input" type="text" placeholder="what did I read about chunk overlap?" autocomplete="off" />
      <button type="submit" class="send">➤</button>
    </form>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
